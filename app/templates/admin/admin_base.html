<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/heaven.ico') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='css/animate.min.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    </link>
    <script type="text/javascript" src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/videojs/video-js.min.css') }}">
    </link>
    <script type="text/javascript" src="{{ url_for('static', filename='js/videojs/video.min.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='js/jquery/jquery.min.js') }}"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/font-awesome.min.css') }}">
    </link>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/animate.min.css') }}">
    </link>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" integrity="sha384-2huaZvOR9iDzHqslqwpR87isEmrfxqyWOF7hr7BY6KG0+hVKLoEXMPUJw3ynWuhO" crossorigin="anonymous"></script>
    <script defer>
     const socket = io();
     socket.on('update', function(data) {
        
            document.getElementById('totalhdd').innerHTML =  "Total: " + data.totalhdd + "GB";
            document.getElementById('usedhdd').innerHTML = "Used: " + data.usedhdd+ "GB";
            document.getElementById('freehdd').innerHTML ="Free: " + data.freehdd+ "GB";
            document.getElementById('temp').innerHTML = "Temp: " + data.temp+ "C";
        });</script>
    {% block head %}{% endblock %}
</head>

<body style="background-color:#151515; color: white;">

    <div style="position:sticky; top:0; width: 100%; z-index: 9999;">
        <nav class="navbar " style="background-color: black;">
            <ul class="nav" style="left: 2vw; position: relative;">
                <a class="navbar-brand" href="{{url_for('home.main')}}" style="color: white;">Kura</a>
                <span style="color: gray; font-size:12px;">ver: {{ version }} </span>
                <li class="nav-item">
                    <a class="nav-link" style="color:blue; font-weight:1000;"
                        href="{{url_for('admin.admin_users')}}">Users</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" style="color:blue; font-weight:1000;"
                        href="{{url_for('admin.admin_posts')}}">Posts</a>
                </li>
               <li class="nav-item">
                    <a class="nav-link" style="color:blue; font-weight:1000;"
                        href="{{url_for('admin.create_user')}}">Register</a>
                </li>
                <li class="nav-item" style="color: white; margin:8px" >
                <span id="usedhdd" >Loading...</span>
                <span id="freehdd"></span>
                <span id="totalhdd"></span>
                <span id="temp"></span>
                </li>
            </ul>

            



    </div>
    </nav>
    </div>
    <div style="position: relative; top:10vh">
        {% block body %}{% endblock %}
    </div>

</body>

</html>
