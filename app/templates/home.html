{% extends 'base.html' %} {% block head %} 
<title>Home</title>
<style>

.play-circle
  {
    width: 10%;
    height: 10%;
    z-index:999;
    background-size:cover;
    padding: 10%;
    background-image: url({{ url_for('static', filename='images/audiojs/play.svg') }});
  }
  .pause-circle
  {
    width: 10%;
    height: 10%;

    background-size:cover;
    padding: 10%;
    background-image: url({{ url_for('static', filename='images/audiojs/pause.svg') }});
  }
  .dl:hover{
    background-color: #262626;
      }
</style>
<meta name="csrf-token" content="{{ csrf_token() }}">

<script type="text/javascript" src="{{ url_for('static', filename='js/run_func.js') }}"></script>

<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/audiojs/audiojs.css') }}" ></link>
<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/medialement/mediaelementplayer.css') }}" ></link>
<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/home.css') }}"></link>

{% endblock %} {% block body %}

<br><br>

<div id="scroller"></div>
{% if request.path == "/search" %}
<div class="d-flex justify-content-center mb-3"  id="load_trigger" data-search="1" data-text={{searchText}}>
  <div class="spinner-border" role="status" onclick="loadMorePosts(1)" style="cursor: pointer;"></div>
  
  </div>
{% else %}
<div class="d-flex justify-content-center mb-3"  id="load_trigger" data-search="0">
  <div class="spinner-border" role="status"></div>
  </div>
{% endif %}

<script type="text/javascript" src="{{ url_for('static', filename='js/lazyLoader.js') }}"></script>
<script type="text/javascript" src="{{ url_for('static', filename='js/mediaelement/mediaelement-and-player.min.js') }}" ></script>
<script type="text/javascript" src="{{ url_for('static', filename='js/mediaelement/mediaelementplayer.min.js') }}" ></script>
<script type="text/javascript" src="{{ url_for('static', filename='js/audiojs/audio.js') }}" ></script>
<script>
    document.addEventListener("DOMContentLoaded", function(event) { 
        var scrollpos = sessionStorage.getItem('scrollpos');
        if (scrollpos) {
            window.scrollTo(0, scrollpos);
        }
    });

    window.onbeforeunload = function() {
        sessionStorage.setItem('scrollpos', window.scrollY);
    };
</script>
<button class="goup"> </button>
{% endblock %}
